_schema-version: "3.1"
ID: esp-management
version: 1.0.0
description: ESP Management System - External Service Provider Portfolio Management

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ============================================================
  # CAP Backend (Node.js)
  # ============================================================
  - name: esp-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: esp-management-db
      - name: esp-management-auth

  # ============================================================
  # HANA Cloud Database (HDI Container)
  # ============================================================
  - name: esp-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: esp-management-db

  # ============================================================
  # App Router (Frontend + Authentication)
  # ============================================================
  - name: esp-management-app
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 128M
      disk-quota: 256M
      keep-existing-routes: true
    build-parameters:
      builder: npm
      requires:
        - name: esp-management-srv
    requires:
      - name: esp-management-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    provides:
      - name: app-api
        properties:
          app-url: ${default-url}

resources:
  # ============================================================
  # HANA Cloud HDI Container
  # ============================================================
  - name: esp-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ============================================================
  # XSUAA Service Instance
  # ============================================================
  - name: esp-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
