<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Consumption Tracking</title>
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            applications: {
                "app-display": {
                    title: "Consumption Tracking",
                    additionalInformation: "SAPUI5.Component=esp.consumption",
                    applicationType: "URL",
                    url: "./",
                    navigationMode: "embedded"
                }
            }
        };
    </script>
    <script id="sap-ushell-bootstrap" src="https://sapui5.hana.ondemand.com/1.133.0/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
    <script id="sap-ui-bootstrap" src="https://sapui5.hana.ondemand.com/1.133.0/resources/sap-ui-core.js"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-preload="async"
        data-sap-ui-resourceroots='{ "esp.consumption": "./" }'>
    </script>
    <script>
        sap.ui.getCore().attachInit(function() { sap.ushell.Container.createRenderer().placeAt("content") });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"><script src="/common/esp-chat-widget.js"></script>
</body>
</html>
