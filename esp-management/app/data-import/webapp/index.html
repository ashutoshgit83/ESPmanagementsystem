<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Data Import</title>
    <script id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.133.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{ "esp.dataimport": "./" }'
        data-sap-ui-onInit="module:sap/ui/core/ComponentSupport">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="esp.dataimport"
         data-id="container"
         data-settings='{ "id": "esp.dataimport" }'
         data-handle-validation="true">
    </div>
<script src="/common/esp-chat-widget.js"></script>
</body>
</html>
